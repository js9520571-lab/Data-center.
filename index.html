<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI Vault Demo</title>
<style>
body{font-family:Arial;margin:0;background:#0b1020;color:white}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:#151c33;padding:15px;border-radius:12px;margin:12px 0}
input,textarea{width:100%;padding:10px;margin:6px 0}
button{padding:10px 15px}
</style>
</head>
<body>
<div class="container">
<h1>AI Vault Demo</h1>
<div id="auth" class="card">
<h3>Create Account</h3>
<input id="u" placeholder="Username">
<input id="p" type="password" placeholder="Password">
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
<p>Admin: admin / admin123</p>
</div>

<div id="app" style="display:none">
<div class="card">
<h3 id="welcome"></h3>
<textarea id="data" rows="8" placeholder="Save anything..."></textarea>
<button onclick="saveData()">Save</button>
<button onclick="logout()">Logout</button>
</div>
<div class="card" id="adminPanel" style="display:none">
<h3>Admin Panel</h3>
<pre id="users"></pre>
</div>
</div>
</div>

<script>
if(!localStorage.users){
 localStorage.users=JSON.stringify({
   admin:{password:"admin123",data:""}
 });
}
function register(){
 let users=JSON.parse(localStorage.users);
 let u=document.getElementById('u').value;
 let p=document.getElementById('p').value;
 if(users[u]) return alert("User exists");
 users[u]={password:p,data:""};
 localStorage.users=JSON.stringify(users);
 alert("Registered");
}
function login(){
 let users=JSON.parse(localStorage.users);
 let u=document.getElementById('u').value;
 let p=document.getElementById('p').value;
 if(users[u] && users[u].password===p){
   localStorage.current=u;
   load();
 } else alert("Invalid login");
}
function load(){
 let u=localStorage.current;
 if(!u) return;
 let users=JSON.parse(localStorage.users);
 document.getElementById('auth').style.display='none';
 document.getElementById('app').style.display='block';
 document.getElementById('welcome').innerText='Welcome '+u;
 document.getElementById('data').value=users[u].data||'';
 if(u==='admin'){
   document.getElementById('adminPanel').style.display='block';
   document.getElementById('users').innerText=JSON.stringify(users,null,2);
 }
}
function saveData(){
 let users=JSON.parse(localStorage.users);
 let u=localStorage.current;
 users[u].data=document.getElementById('data').value;
 localStorage.users=JSON.stringify(users);
 alert("Saved");
}
function logout(){localStorage.removeItem('current');location.reload();}
load();
</script>
</body>
</html>
